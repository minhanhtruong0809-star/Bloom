<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Space Explorer — NASA APOD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-cyan: #00ffe7;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe135;
    --neon-purple: #bc4fff;
    --deep-space: #03020f;
    --space-mid: #0c0a2a;
    --card-bg: rgba(10, 8, 40, 0.85);
    --font-display: 'Orbitron', monospace;
    --font-body: 'Space Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--deep-space);
    color: #e0deff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Layout */
  .content {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3.5rem 1rem 2rem;
  }
  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .tagline {
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: var(--neon-cyan);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .api-pill {
    display: inline-block;
    margin-top: 1rem;
    background: rgba(0,255,231,0.1);
    border: 1px solid var(--neon-cyan);
    border-radius: 999px;
    padding: 0.3rem 1rem;
    font-size: 0.7rem;
    color: var(--neon-cyan);
    letter-spacing: 0.15em;
  }
  .api-pill a {
    color: var(--neon-cyan);
    text-decoration: none;
    font-weight: 700;
  }
  .api-pill a:hover { text-decoration: underline; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin: 2rem 0 2.5rem;
  }
  .ctrl-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--neon-purple);
    text-transform: uppercase;
  }
  input[type="date"] {
    background: var(--card-bg);
    border: 1px solid var(--neon-purple);
    border-radius: 8px;
    color: #e0deff;
    font-family: var(--font-body);
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    cursor: pointer;
  }
  input[type="date"]:focus { border-color: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }

  .btn {
    font-family: var(--font-display);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 8px;
    border: none;
    padding: 0.55rem 1.25rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    color: #fff;
    box-shadow: 0 0 12px rgba(255,45,120,0.4);
  }
  .btn-primary:hover { box-shadow: 0 0 22px rgba(255,45,120,0.7); }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
  }
  .btn-secondary:hover { background: rgba(0,255,231,0.08); }

  /* Gallery grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* Card */
  .apod-card {
    background: var(--card-bg);
    border: 1px solid rgba(188,79,255,0.3);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .apod-card:hover {
    transform: translateY(-4px);
    border-color: var(--neon-purple);
    box-shadow: 0 8px 30px rgba(188,79,255,0.25);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-media {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #08052b;
  }
  .card-media-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0c0a2a, #1a1060);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--neon-purple);
  }

  .card-body {
    padding: 1rem 1.1rem 1.2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .card-date {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--neon-yellow);
    text-transform: uppercase;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
    letter-spacing: 0.04em;
  }
  .card-explanation {
    font-size: 0.72rem;
    line-height: 1.7;
    color: rgba(224,222,255,0.7);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-link {
    margin-top: auto;
    align-self: flex-start;
    font-size: 0.65rem;
    color: var(--neon-cyan);
    letter-spacing: 0.1em;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .card-link:hover { border-color: var(--neon-cyan); }

  /* Featured hero */
  .hero-card {
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 0;
    min-height: 320px;
  }
  .hero-card .card-media {
    width: 55%;
    aspect-ratio: unset;
    flex-shrink: 0;
    height: auto;
  }
  .hero-card .card-body { padding: 1.5rem 1.5rem; }
  .hero-card .card-title { font-size: 1.1rem; }
  .hero-card .card-explanation { -webkit-line-clamp: 8; }
  .hero-badge {
    display: inline-block;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
  }

  @media (max-width: 620px) {
    .hero-card { flex-direction: column; }
    .hero-card .card-media { width: 100%; aspect-ratio: 16/9; }
  }

  /* Status */
  .status-bar {
    text-align: center;
    padding: 2rem 0;
    font-size: 0.8rem;
    color: var(--neon-purple);
    letter-spacing: 0.1em;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(188,79,255,0.3);
    border-top-color: var(--neon-purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,45,120,0.1);
    border: 1px solid var(--neon-pink);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    color: var(--neon-pink);
    font-size: 0.78rem;
    text-align: center;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(224,222,255,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="content">
  <header>
    <div class="logo-badge">Space Explorer</div>
    <p class="tagline">Powered by NASA's Astronomy Picture of the Day</p>
    <div class="api-pill">
      API: <a href="https://api.nasa.gov/" target="_blank">api.nasa.gov</a>
      &nbsp;·&nbsp; Endpoint: <code>/planetary/apod</code>
    </div>
  </header>

  <div class="controls">
    <span class="ctrl-label">From</span>
    <input type="date" id="start-date" />
    <span class="ctrl-label">To</span>
    <input type="date" id="end-date" />
    <button class="btn btn-primary" onclick="fetchAPOD()">Launch &#9654;</button>
    <button class="btn btn-secondary" onclick="fetchRandom()">Random &#9733;</button>
  </div>

  <div id="status" class="status-bar" style="display:none;"></div>
  <div id="gallery" class="gallery"></div>
</div>

<footer>Data provided by NASA Open APIs &nbsp;·&nbsp; No API key required &nbsp;·&nbsp; DEMO_KEY used</footer>

<script>
/* ── Starfield ── */
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 220}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.003 + 0.001,
    color: ['#fff','#00ffe7','#bc4fff','#ffe135'][Math.floor(Math.random()*4)]
  }));
}
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = 0.3 + 0.6 * Math.abs(Math.sin(s.a));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

/* ── Dates ── */
const today = new Date();
const pad = n => String(n).padStart(2,'0');
const fmtDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };

const startInput = document.getElementById('start-date');
const endInput = document.getElementById('end-date');
startInput.max = endInput.max = fmtDate(today);
startInput.value = fmtDate(addDays(today,-5));
endInput.value = fmtDate(today);

/* ── API ── */
const API_KEY = 'DEMO_KEY';
const BASE = 'https://api.nasa.gov/planetary/apod';

function setStatus(msg, loading=false) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display='none'; return; }
  el.style.display='block';
  el.innerHTML = loading ? `<span class="spinner"></span>${msg}` : msg;
}

function renderCards(items) {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  if (!items.length) { gallery.innerHTML = '<div class="error-box">No results found.</div>'; return; }
  const sorted = [...items].sort((a,b) => b.date.localeCompare(a.date));
  sorted.forEach((item, i) => {
    const isHero = i === 0;
    const isVideo = item.media_type === 'video';
    const thumbUrl = item.thumbnail_url || item.url;

    const card = document.createElement('div');
    card.className = 'apod-card' + (isHero ? ' hero-card' : '');
    card.style.animationDelay = `${i * 0.07}s`;

    let mediaHTML;
    if (isVideo) {
      mediaHTML = `<div class="card-media-placeholder">&#9654; VIDEO</div>`;
    } else {
      mediaHTML = `<img class="card-media" src="${thumbUrl}" alt="${item.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-media-placeholder\\'>&#127756;</div>'" />`;
    }

    card.innerHTML = `
      ${mediaHTML}
      <div class="card-body">
        ${isHero ? '<span class="hero-badge">&#9733; Today\'s Feature</span>' : ''}
        <div class="card-date">${item.date}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-explanation">${item.explanation}</div>
        <a class="card-link" href="${item.hdurl || item.url}" target="_blank">View Full Resolution &#8599;</a>
      </div>`;
    gallery.appendChild(card);
  });
}

async function fetchAPOD() {
  const start = startInput.value;
  const end = endInput.value;
  if (!start || !end) { setStatus('Please select both dates.'); return; }
  if (start > end) { setStatus('Start date must be before end date.'); return; }

  setStatus('Scanning the cosmos...', true);
  document.getElementById('gallery').innerHTML = '';
  try {
    const url = `${BASE}?api_key=${API_KEY}&start_date=${start}&end_date=${end}&thumbs=true`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`NASA API error: ${res.status}`);
    const data = await res.json();
    const items = Array.isArray(data) ? data : [data];
    setStatus('');
    renderCards(items);
  } catch(e) {
    setStatus('');
    document.getElementById('gallery').innerHTML = `<div class="error-box">&#9888; ${e.message}</div>`;
  }
}

async function fetchRandom() {
  setStatus('Rolling the cosmic dice...', true);
  document.getElementById('gallery').innerHTML = '';
  try {
    const url = `${BASE}?api_key=${API_KEY}&count=6&thumbs=true`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`NASA API error: ${res.status}`);
    const data = await res.json();
    setStatus('');
    renderCards(data);
  } catch(e) {
    setStatus('');
    document.getElementById('gallery').innerHTML = `<div class="error-box">&#9888; ${e.message}</div>`;
  }
}

fetchAPOD();
</script>
</body>
</html>
